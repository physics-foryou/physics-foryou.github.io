<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Exam Session</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .meta-header {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .choice-btn {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 1px solid #d1d5db;
            padding: 14px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .choice-btn:hover {
            background-color: #f9fafb;
            border-color: #9ca3af;
        }
        .choice-letter {
            width: 28px;
            height: 28px;
            border: 1px solid #d1d5db;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: 600;
            font-size: 13px;
            background: #f9fafb;
            flex-shrink: 0;
        }
        .nav-footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }
        .action-btn {
            background: #1b2a47;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .action-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="meta" class="meta-header">Loading exam metadata...</div>
        <div id="question" class="question-text">Loading question...</div>
        
        <div id="choices" class="choices-container">
            </div>

        <div class="nav-footer">
            <button id="prev-btn" class="action-btn" onclick="changeQuestion(-1)" disabled>Back</button>
            <span id="progress">Question 0 of 0</span>
            <button id="next-btn" class="action-btn" onclick="changeQuestion(1)">Next</button>
        </div>
    </div>

    <script>
        // 1. Grab parameters out of the URL string
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject') || 'ap1';
        const examNum = urlParams.get('exam') || '1';

        const courseNames = {
            'ap1': 'AP Physics 1',
            'ap2': 'AP Physics 2',
            'mech': 'AP C: Mechanics',
            'em': 'AP C: Electricity & Magnetism'
        };

        // Words map lookup to parse file variable integers into strings
        const numberWords = ["Zero", "One", "Two", "Three", "Four", "Five"];

        let currentQuestionIdx = 0;
        let examQuestions = [];

        // 2. Point to the folder path you just finished setting up
        const scriptElement = document.createElement('script');
        scriptElement.src = `${subject}/${subject}-practice-exam-mcqs/${subject}-practice-exam-mcq-pool-${examNum}.js`;
        document.head.appendChild(scriptElement);

        // 3. Extract the array data once script is active
        scriptElement.onload = function() {
            // Check for common variable fallback name
            if (typeof practiceExamPool !== 'undefined') {
                examQuestions = practiceExamPool;
            } 
            // Smart Check: Automatically maps to variable names like "ap1PracticeExamPoolOne"
            else {
                const wordValue = numberWords[parseInt(examNum)] || "One";
                const customVarName = `${subject}PracticeExamPool${wordValue}`;
                
                if (typeof window[customVarName] !== 'undefined') {
                    examQuestions = window[customVarName];
                } else if (typeof ap1PracticeExamPoolOne !== 'undefined') {
                    examQuestions = ap1PracticeExamPoolOne; // Backup catch-all
                }
            }

            if (examQuestions.length > 0) {
                renderQuestion();
            } else {
                document.getElementById('question').innerText = `Error: Could not locate question array. If you add new data files, naming the array 'practiceExamPool' is highly recommended!`;
            }
        };

        scriptElement.onerror = function() {
            document.getElementById('question').innerText = `Error: Cannot load data path:\n${scriptElement.src}`;
        };

        // 4. Paint UI Layout Elements
        function renderQuestion() {
            const qData = examQuestions[currentQuestionIdx];
            
            const courseTitle = courseNames[subject] || subject.toUpperCase();
            document.getElementById('meta').innerText = `${courseTitle} — Test ${examNum} — ${qData.unit || 'Review'}`;
            
            // Render text. If fields are blank or placeholders, indicate cleanly.
            document.getElementById('question').innerText = qData.question || "This question is currently a placeholder slot in your data array.";
            
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            
            if (qData.choices && qData.choices.length > 0) {
                qData.choices.forEach((choice, index) => {
                    const button = document.createElement('button');
                    button.className = 'choice-btn';
                    button.innerHTML = `<span class="choice-letter">${letters[index]}</span> <span>${choice}</span>`;
                    choicesDiv.appendChild(button);
                });
            } else {
                choicesDiv.innerHTML = '<p style="color:#6b7280; font-style:italic;">No multiple choice options populated for this placeholder space yet.</p>';
            }

            document.getElementById('progress').innerText = `Question ${currentQuestionIdx + 1} of ${examQuestions.length}`;
            document.getElementById('prev-btn').disabled = currentQuestionIdx === 0;
            document.getElementById('next-btn').innerText = currentQuestionIdx === examQuestions.length - 1 ? 'Finish' : 'Next';
        }

        function changeQuestion(direction) {
            currentQuestionIdx += direction;
            if (currentQuestionIdx >= examQuestions.length) {
                alert("Session complete! Heading back to dashboard.");
                window.location.href = 'home-page.html';
                return;
            }
            renderQuestion();
        }
    </script>
</body>
</html>
