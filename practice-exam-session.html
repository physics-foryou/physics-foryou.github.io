<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Exam Session</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .meta-header {
            font-size: 14px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .choice-btn {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 1px solid #d1d5db;
            padding: 14px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            transition: all 0.2s;
        }
        .choice-btn:hover {
            background-color: #f9fafb;
            border-color: #9ca3af;
        }
        .choice-letter {
            width: 28px;
            height: 28px;
            border: 1px solid #d1d5db;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: 600;
            font-size: 13px;
            background: #f9fafb;
        }
        .nav-footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }
        .action-btn {
            background: #1b2a47;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .action-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="meta" class="meta-header">Loading exam metadata...</div>
        <div id="question" class="question-text">Loading question...</div>
        
        <div id="choices" class="choices-container">
            </div>

        <div class="nav-footer">
            <button id="prev-btn" class="action-btn" onclick="changeQuestion(-1)" disabled>Back</button>
            <span id="progress">Question 0 of 0</span>
            <button id="next-btn" class="action-btn" onclick="changeQuestion(1)">Next</button>
        </div>
    </div>

    <script>
        // 1. Target URL string values parameters
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject') || 'ap1';
        const examNum = urlParams.get('exam') || '1';

        let currentQuestionIdx = 0;
        let examQuestions = [];

        // 2. Inject script source matching file structure dynamically
        const scriptElement = document.createElement('script');
        scriptElement.src = `${subject}/${subject}-practice-exam-${examNum}-pool.js`;
        document.head.appendChild(scriptElement);

        // 3. Initialize quiz layout once file dependency script handles loading
        scriptElement.onload = function() {
            // Check global pool variable corresponding to loaded file
            if (typeof ap1PracticeExamOnePool !== 'undefined') {
                examQuestions = ap1PracticeExamOnePool;
                renderQuestion();
            } else {
                document.getElementById('question').innerText = "Error: Question pool configurations could not be loaded.";
            }
        };

        // 4. Clean interface render structure
        function renderQuestion() {
            if (examQuestions.length === 0) return;
            
            const qData = examQuestions[currentQuestionIdx];
            
            // Build metadata header
            document.getElementById('meta').innerText = `${subject.toUpperCase()} Exam ${examNum} — ${qData.unit || 'General Review'}`;
            
            // Put down main text body cleanly
            document.getElementById('question').innerText = qData.question;
            
            // Clear standard layout nodes and replace with incoming array entries
            const choicesDiv = document.getElementById('choices');
            choicesDiv.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            qData.choices.forEach((choice, index) => {
                const button = document.createElement('button');
                button.className = 'choice-btn';
                button.innerHTML = `<span class="choice-letter">${letters[index]}</span> <span>${choice}</span>`;
                choicesDiv.appendChild(button);
            });

            // Handle footer counters and active states
            document.getElementById('progress').innerText = `Question ${currentQuestionIdx + 1} of ${examQuestions.length}`;
            document.getElementById('prev-btn').disabled = currentQuestionIdx === 0;
            document.getElementById('next-btn').innerText = currentQuestionIdx === examQuestions.length - 1 ? 'Finish' : 'Next';
        }

        function changeQuestion(direction) {
            currentQuestionIdx += direction;
            if (currentQuestionIdx >= examQuestions.length) {
                alert("You have completed the mock practice block!");
                currentQuestionIdx = examQuestions.length - 1;
                return;
            }
            renderQuestion();
        }
    </script>
</body>
</html>
