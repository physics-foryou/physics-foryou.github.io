<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics For You</title>
    <style>
        :root {
            --bg-color: #6a7f93;        
            --panel-bg: #1c1a27;        
            --header-bg: #3c3957;       
            --text-main: #d1d2d6;
            --text-dim: #9ba1a6;
        }

        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .workspace {
            max-width: 950px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid #444;
            border-radius: 3px;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .panel-header {
            background-color: var(--header-bg);
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #555;
        }
        .panel-header::before { content: "▼ "; font-size: 10px; }

        .panel-content { padding: 15px; }

        .selector-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .select-btn {
            background: #2b283d;
            border: 1px solid #5c5978;
            color: var(--text-main);
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .select-btn.active {
            background-color: #3b4e70;
            border-color: #5d7cb3;
        }

        .action-btn {
            background-color: #2e593a;
            border: 1px solid #478557;
            color: #fff;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
        }
        .action-btn:hover { background-color: #3b734b; }

        .exam-row {
            border-bottom: 1px solid #333;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .exam-row:last-child { border-bottom: none; }
        
        .exam-title { font-weight: bold; width: 220px; flex-shrink: 0; }
        
        .test-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
        }
        .test-link {
            background: #2b283d;
            border: 1px solid #5c5978;
            color: var(--text-main);
            padding: 6px 12px;
            text-decoration: none;
            font-size: 12px;
            border-radius: 2px;
            text-align: center;
            min-width: 55px;
        }
        .test-link:hover { background-color: var(--header-bg); }

        .btn-easy { border-color: #478557; }
        .btn-easy:hover { background-color: #2e593a; }
        .btn-med { border-color: #b37d14; }
        .btn-med:hover { background-color: #805603; }
        .btn-hard { border-color: #a83232; }
        .btn-hard:hover { background-color: #731f1f; }
    </style>
</head>

                    <button class="select-btn" onclick="setSubject('mech', event)">APC: Mech</button>
                    <button class="select-btn" onclick="setSubject('em', event)">APC: E&M</button>
                </div>
                <button class="action-btn" onclick="launchDailyTest()">Start Daily Question</button>
            </div>
        </div>
