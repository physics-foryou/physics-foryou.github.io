<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Question Room</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="daily-pool/ap1.js"></script>
    <script src="daily-pool/ap2.js"></script>
    <script src="daily-pool/mech.js"></script>
    <script src="daily-pool/em.js"></script>
    
    <style>
        :root {
            --bg-color: #6a7f93;        
            --panel-bg: #1c1a27;        
            --header-bg: #3c3957;       
            --text-main: #d1d2d6;
            --text-dim: #9ba1a6;
        }
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }
        .workspace { max-width: 750px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { background-color: var(--panel-bg); border: 1px solid #444; border-radius: 3px; overflow: hidden; box-shadow: 4px 4px 10px rgba(0,0,0,0.3); }
        .panel-header { background-color: var(--header-bg); padding: 10px 14px; font-size: 14px; font-weight: bold; border-bottom: 1px solid #555; display: flex; justify-content: space-between; align-items: center;}
        .panel-content { padding: 20px; }
        .timer-box { font-size: 16px; color: #a8ffb2; font-weight: bold; }
        .timer-expired { color: #ff6b6b; }
        
        .choice-btn { display: block; width: 100%; text-align: left; background: #2b283d; border: 1px solid #5c5978; color: var(--text-main); padding: 14px; margin: 10px 0; cursor: pointer; font-family: inherit; border-radius: 2px; font-size: 14px; }
        .choice-btn:hover { background-color: var(--header-bg); }
        .choice-btn.selected { border-color: #007BFF; background-color: #1a293d; }
        .choice-btn.correct { border-color: #478557 !important; background-color: #1c3824 !important; color: #fff; }
        .choice-btn.incorrect { border-color: #a83232 !important; background-color: #421b1b !important; }

        .action-btn { background-color: #2e593a; border: 1px solid #478557; color: white; padding: 10px 20px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold; display: none; margin-top: 15px; }
        .nav-btn { background-color: #2b283d; border: 1px solid #5c5978; color: var(--text-dim); padding: 8px 16px; text-decoration: none; font-family: inherit; font-size: 13px; display: inline-block; margin-top: 15px; margin-right: 10px;}
        .nav-btn:hover { color: #fff; }
        #explanation-box { background: #171621; border-left: 4px solid #3b4e70; padding: 15px; margin-top: 20px; display: none; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="panel">
            <div class="panel-header">
                <span>⏱️ Timer</span>
                <span id="timer" class="timer-box">00:00</span>
            </div>
            <div class="panel-content">
                <h3 id="subject-title" style="margin-top:0; color:#6ba6ff;">Loading...</h3>
                <div id="question-text" style="font-size: 15px; margin-bottom: 20px; line-height: 1.5;">Finding today's question...</div>
                
                <div id="choices-container"></div>

                <button id="submit-btn" class="action-btn" onclick="submitAnswer()">Submit Answer</button>
                
                <div id="explanation-box">
                    <strong style="color: #6ba6ff;">Explanation:</strong>
                    <p id="explanation-text" style="margin: 5px 0 0 0;"></p>
                </div>

                <hr style="border: none; border-top: 1px solid #333; margin-top: 25px;">
                <a href="index.html" class="nav-btn">◀ Go Back Home</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const subject = urlParams.get('subject') || 'ap1';
        
        const configs = {
            ap1: { name: "AP Physics 1", time: 108, pool: typeof ap1DailyPool !== 'undefined' ? ap1DailyPool : [] },
            ap2: { name: "AP Physics 2", time: 108, pool: typeof ap2DailyPool !== 'undefined' ? ap2DailyPool : [] },
            mech: { name: "AP C: Mechanics", time: 78, pool: typeof mechDailyPool !== 'undefined' ? mechDailyPool : [] },
            em: { name: "AP C: E&M", time: 78, pool: typeof emDailyPool !== 'undefined' ? emDailyPool : [] }
        };

        let currentConfig = configs[subject];
        document.getElementById('subject-title').innerText = `${currentConfig.name} - Daily Challenge`;

        // Load correct question
        let questionData = { question: "No questions added to this category yet!", choices: [], correctIndex: 0, explanation: "N/A" };
        if (currentConfig.pool && currentConfig.pool.length > 0) {
            const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
            const questionIndex = dayOfYear % currentConfig.pool.length;
            questionData = currentConfig.pool[questionIndex];
        }

        document.getElementById('question-text').innerHTML = questionData.question;
        const container = document.getElementById('choices-container');
        questionData.choices.forEach((choice, idx) => {
            container.innerHTML += `<button class="choice-btn" onclick="selectChoice(this, ${idx})">${choice}</button>`;
        });

        if(window.MathJax) { MathJax.typeset(); }

        let selectedIndex = null;
        let isSubmitted = false;
        let timeRemaining = currentConfig.time;
        let overtimeSeconds = 0;

        function selectChoice(btnElement, idx) {
            if (isSubmitted) return;
            selectedIndex = idx;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            document.getElementById('submit-btn').style.display = 'inline-block';
        }

        function submitAnswer() {
            if (selectedIndex === null || isSubmitted) return;
            isSubmitted = true;
            clearInterval(countdown);
            
            document.getElementById('submit-btn').style.display = 'none';
            const buttons = document.querySelectorAll('.choice-btn');
            
            buttons.forEach((btn, idx) => {
                btn.classList.remove('selected');
                if (idx === questionData.correctIndex) {
                    btn.classList.add('correct');
                } else if (idx === selectedIndex) {
                    btn.classList.add('incorrect');
                }
            });

            document.getElementById('explanation-text').innerHTML = questionData.explanation;
            document.getElementById('explanation-box').style.display = 'block';
            if(window.MathJax) { MathJax.typeset(); }
        }

        const timerElement = document.getElementById('timer');
        function runTimerClock() {
            if (timeRemaining >= 0) {
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                timeRemaining--;
            } else {
                timerElement.classList.add('timer-expired');
                overtimeSeconds++;
                timerElement.innerText = `OVERTIME: +${overtimeSeconds}s`;
            }
        }
        runTimerClock();
        const countdown = setInterval(runTimerClock, 1000);
    </script>
</body>
</html>
