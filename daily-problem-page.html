<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Question Room</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <script src="ap-physics-1/ap1-daily-pool.js"></script>
    <script src="daily-pool/ap2.js"></script>
    <script src="daily-pool/mech.js"></script>
    <script src="daily-pool/em.js"></script>
    
    <style>
        :root {
            --bg-color: #6a7f93;        
            --panel-bg: #1c1a27;        
            --header-bg: #3c3957;       
            --text-main: #d1d2d6;
            --text-dim: #9ba1a6;
        }
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }
        .workspace { max-width: 750px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; position: relative; }
        .panel { background-color: var(--panel-bg); border: 1px solid #444; border-radius: 3px; overflow: hidden; box-shadow: 4px 4px 10px rgba(0,0,0,0.3); }
        .panel-header { background-color: var(--header-bg); padding: 10px 14px; font-size: 14px; font-weight: bold; border-bottom: 1px solid #555; display: flex; justify-content: space-between; align-items: center;}
        .panel-content { padding: 20px; }
        
        .timer-box { font-size: 16px; color: #ffffff; font-weight: bold; transition: color 0.3s ease; }
        .timer-warning { color: #ff6b6b !important; }
        
        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #421b1b;
            border: 1px solid #a83232;
            color: #ffb3b3;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .question-image-container {
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        .question-image {
            max-width: 100%;
            max-height: 350px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #222;
        }
        
        .choice-btn { display: block; width: 100%; text-align: left; background: #2b283d; border: 1px solid #5c5978; color: var(--text-main); padding: 14px; margin: 10px 0; cursor: pointer; font-family: inherit; border-radius: 2px; font-size: 14px; }
        .choice-btn:hover { background-color: var(--header-bg); }
        .choice-btn.selected { border-color: #007BFF; background-color: #1a293d; }
        .choice-btn.correct { border-color: #478557 !important; background-color: #1c3824 !important; color: #fff; cursor: default; }
        .choice-btn.incorrect { border-color: #a83232 !important; background-color: #421b1b !important; cursor: default; }
        .choice-btn.disabled:hover { background-color: #2b283d; cursor: default; }

        .action-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }

        .action-btn { 
            background-color: #2e593a; 
            border: 1px solid #478557; 
            color: white; 
            padding: 9px 20px; 
            cursor: pointer; 
            font-family: inherit; 
            font-size: 13px; 
            font-weight: bold; 
            border-radius: 2px;
            visibility: hidden;
        }
        .action-btn:hover { background-color: #3b734b; }

        .nav-btn { 
            background-color: #2b283d; 
            border: 1px solid #5c5978; 
            color: var(--text-dim); 
            padding: 8px 16px; 
            text-decoration: none; 
            font-family: inherit; 
            font-size: 13px; 
            display: inline-block;
            border-radius: 2px;
        }
        .nav-btn:hover { color: #fff; background-color: var(--header-bg); }
        
        #explanation-box { background: #171621; border-left: 4px solid #3b4e70; padding: 15px; margin-top: 20px; display: none; font-size: 13px; line-height: 1.6; }
        
        .meta-line { margin-bottom: 8px; }
        .meta-label { color: #6ba6ff; font-weight: bold; }
        .meta-val { color: var(--text-main); }
        
        .difficulty-tag { display: inline-block; padding: 2px 6px; font-size: 11px; font-weight: bold; border-radius: 3px; margin-left: 5px; text-transform: uppercase;}
        .diff-easy { background-color: #1c3824; color: #a8ffb2; border: 1px solid #478557; }
        .diff-medium { background-color: #42311b; color: #ffdca8; border: 1px solid #b37d14; }
        .diff-hard { background-color: #421b1b; color: #ffb3b3; border: 1px solid #a83232; }
    </style>
</head>
<body class="tex2jax_ignore">

    <div class="workspace tex2jax_process">
        <div class="panel">
            <div class="panel-header">
                <span>⏱️ Pacing</span>
                <span id="timer" class="timer-box">02:00</span>
            </div>
            <div class="panel-content">
                <h3 id="subject-title" style="margin-top:0; color:#6ba6ff; margin-bottom: 4px;">Loading...</h3>
                
                <div id="midnight-countdown" style="font-size: 12px; color: var(--text-dim); margin-bottom: 18px;">New Question in: --:--:--</div>
                
                <div id="image-container" class="question-image-container">
                    <img id="question-img" src="" class="question-image" alt="Question Diagram">
                </div>

                <div id="question-text" style="font-size: 15px; margin-bottom: 20px; line-height: 1.5;">Finding today's question...</div>
                
                <div id="choices-container"></div>
                
                <div id="explanation-box">
                    <div class="meta-line">
                        <span class="meta-label">Difficulty:</span>
                        <span id="difficulty-span" class="difficulty-tag"></span>
                    </div>
                    <div class="meta-line">
                        <span class="meta-label">Unit:</span> <span id="meta-unit" class="meta-val"></span>
                    </div>
                    <div class="meta-line">
                        <span class="meta-label">Topic:</span> <span id="meta-topic" class="meta-val"></span>
                    </div>
                    <div class="meta-line">
                        <span class="meta-label">Skill:</span> <span id="meta-skill" class="meta-val"></span>
                    </div>
                    <div class="meta-line" style="margin-top: 12px; margin-bottom: 12px;">
                        <span class="meta-label" style="display: block; margin-bottom: 4px;">Explanation:</span>
                        <p id="explanation-text" style="margin: 0;"></p>
                    </div>
                    <div class="meta-line" style="border-top: 1px dashed #333; padding-top: 8px; font-size: 11px;">
                        <span class="meta-label" style="color: var(--text-dim);">Question ID:</span> <span id="meta-id" style="color: var(--text-dim);"></span>
                    </div>
                </div>

                <hr style="border: none; border-top: 1px solid #333; margin-top: 25px;">
                
                <div class="action-bar">
                    <a href="home-page.html" class="nav-btn">◀ Go Back Home</a>
                    <button id="submit-btn" class="action-btn" onclick="submitAnswer()">Submit Answer</button>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="toast-notification">⚠️ Notice: 30 seconds remaining</div>

    <script>
        // Global State
        let selectedIndex = null;
        let isSubmitted = false;
        let timeRemaining = 120;
        let overtimeSeconds = 0;
        let countdown;
        let questionData = {};
        let storageKey = '';
        let subject = 'ap1';

        // Wait entirely for external script loading to settle execution order issues
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            subject = urlParams.get('subject') || 'ap1';
            
            const configs = {
                ap1: { name: "AP Physics 1", time: 120, pool: typeof ap1DailyPool !== 'undefined' ? ap1DailyPool : [] },
                ap2: { name: "AP Physics 2", time: 120, pool: typeof ap2DailyPool !== 'undefined' ? ap2DailyPool : [] },
                mech: { name: "AP C: Mechanics", time: 120, pool: typeof mechDailyPool !== 'undefined' ? mechDailyPool : [] },
                em: { name: "AP C: E&M", time: 120, pool: typeof emDailyPool !== 'undefined' ? emDailyPool : [] }
            };

            let currentConfig = configs[subject];
            timeRemaining = currentConfig.time;
            document.getElementById('subject-title').innerText = `${currentConfig.name} Daily Problem`;

            const now = new Date();
            const localYear = now.getFullYear();
            const localMonth = String(now.getMonth() + 1).padStart(2, '0');
            const localDay = String(now.getDate()).padStart(2, '0');
            const todayKey = `${localYear}-${localMonth}-${localDay}`;
            storageKey = `daily_ans_${subject}_${todayKey}`;

            if (currentConfig.pool && currentConfig.pool.length > 0) {
                const startOfYear = new Date(localYear, 0, 1);
                const diffInMs = now - startOfYear;
                const dayOfYear = Math.floor(diffInMs / (1000 * 60 * 60 * 24)) + 1;
                const questionIndex = dayOfYear % currentConfig.pool.length;
                questionData = currentConfig.pool[questionIndex];
            } else {
                questionData = { id: "N/A", unit: "N/A", topic: "N/A", skill: "N/A", question: "No questions found in pool file!", image: "", choices: [], correctIndex: 0, difficulty: "Easy", explanation: "N/A" };
            }

            // Render content
            if (questionData.image && questionData.image.trim() !== "") {
                const imgElement = document.getElementById('question-img');
                imgElement.src = questionData.image;
                document.getElementById('image-container').style.display = 'block';
            }

            document.getElementById('question-text').innerHTML = questionData.question;
            const container = document.getElementById('choices-container');
            container.innerHTML = ''; // Clear fallback
            
            if (questionData.choices) {
                questionData.choices.forEach((choice, idx) => {
                    container.innerHTML += `<button class="choice-btn" onclick="selectChoice(this, ${idx})">${choice}</button>`;
                });
            }

            document.getElementById('meta-unit').innerText = questionData.unit || "N/A";
            document.getElementById('meta-topic').innerText = questionData.topic || "N/A";
            document.getElementById('meta-skill').innerText = questionData.skill || "N/A";
            document.getElementById('meta-id').innerText = questionData.id || "N/A";
            document.getElementById('explanation-text').innerHTML = questionData.explanation;

            const diffSpan = document.getElementById('difficulty-span');
            const diffLevel = (questionData.difficulty || "Easy").toLowerCase();
            diffSpan.innerText = diffLevel;
            diffSpan.className = `difficulty-tag diff-${diffLevel}`;

            // Trigger MathJax Processing
            setTimeout(() => { if(window.MathJax) { MathJax.typesetPromise(); } }, 100);

            // Handle LocalStorage tracking
            const savedAnswer = localStorage.getItem(storageKey);
            if (savedAnswer !== null) {
                isSubmitted = true;
                selectedIndex = parseInt(savedAnswer, 10);
                document.getElementById('timer').innerText = "COMPLETED";
                
                const buttons = document.querySelectorAll('.choice-btn');
                buttons.forEach((btn, idx) => {
                    if (idx === questionData.correctIndex) {
                        btn.classList.add('correct');
                    } else if (idx === selectedIndex) {
                        btn.classList.add('incorrect');
                    } else {
                        btn.classList.add('disabled');
                    }
                });
                document.getElementById('explanation-box').style.display = 'block';
                setTimeout(() => { if(window.MathJax) { MathJax.typesetPromise(); } }, 100);
            } else {
                countdown = setInterval(runTimerClock, 1000);
            }
        };

        function selectChoice(btnElement, idx) {
            if (isSubmitted) return;
            selectedIndex = idx;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            document.getElementById('submit-btn').style.visibility = 'visible';
        }

        function submitAnswer() {
            if (selectedIndex === null || isSubmitted) return;
            isSubmitted = true;
            clearInterval(countdown);
            
            localStorage.setItem(storageKey, selectedIndex);
            
            document.getElementById('submit-btn').style.display = 'none';
            const buttons = document.querySelectorAll('.choice-btn');
            
            buttons.forEach((btn, idx) => {
                btn.classList.remove('selected');
                if (idx === questionData.correctIndex) {
                    btn.classList.add('correct');
                } else if (idx === selectedIndex) {
                    btn.classList.add('incorrect');
                } else {
                    btn.classList.add('disabled');
                }
            });

            document.getElementById('explanation-box').style.display = 'block';
            if(window.MathJax) { MathJax.typesetPromise(); }
        }

        const timerElement = document.getElementById('timer');
        const notificationElement = document.getElementById('notification');

        function runTimerClock() {
            if (timeRemaining >= 0) {
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                timerElement.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeRemaining === 30) {
                    timerElement.classList.add('timer-warning');
                    notificationElement.style.display = 'block';
                    setTimeout(() => { notificationElement.style.display = 'none'; }, 6000);
                }
                timeRemaining--;
            } else {
                timerElement.classList.add('timer-warning');
                overtimeSeconds++;
                timerElement.innerText = `OVERTIME: +${overtimeSeconds}s`;
            }
        }

        function runMidnightCountdown() {
            const currentTime = new Date();
            const nextMidnight = new Date(currentTime.getFullYear(), currentTime.getMonth(), currentTime.getDate() + 1, 0, 0, 0);
            const timeDiff = nextMidnight - currentTime;

            const h = Math.floor(timeDiff / (1000 * 60 * 60));
            const m = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((timeDiff % (1000 * 60)) / 1000);

            document.getElementById('midnight-countdown').innerText = 
                `New Question in: ${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        runMidnightCountdown();
        setInterval(runMidnightCountdown, 1000);
    </script>
</body>
</html>
